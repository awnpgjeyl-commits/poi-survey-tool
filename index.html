<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地块周边业态调查工具</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h1>地块周边业态调查工具</h1>
            </header>

            <div class="sidebar-section">
                <h3>📍 地址定位</h3>
                <div class="input-group">
                    <input type="text" id="address-input" placeholder="请输入项目地址...">
                    <button id="search-address-btn" class="btn-primary">定位</button>
                </div>
                <div id="current-location" class="location-display"></div>
            </div>

            <div class="sidebar-section">
                <h3>🎯 搜索半径</h3>
                <div class="radius-control">
                    <input type="range" id="radius-slider" min="1" max="10" value="5">
                    <span id="radius-value">5 km</span>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>🏢 业态分类</h3>
                <div class="category-list">
                    <label class="category-item">
                        <input type="checkbox" name="category" value="写字楼" checked>
                        <span>写字楼</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" name="category" value="产业园" checked>
                        <span>产业园</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" name="category" value="商业综合体" checked>
                        <span>商业综合体</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" name="category" value="酒店" checked>
                        <span>酒店</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" name="category" value="教育机构" checked>
                        <span>教育机构</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" name="category" value="医疗设施" checked>
                        <span>医疗设施</span>
                    </label>
                    <label class="category-item">
                        <input type="checkbox" name="category" value="餐饮娱乐" checked>
                        <span>餐饮娱乐</span>
                    </label>
                </div>
                <div class="category-actions">
                    <button id="select-all-btn" class="btn-secondary">全选</button>
                    <button id="clear-all-btn" class="btn-secondary">清空</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>📝 其他 POI</h3>
                <div class="input-group">
                    <input type="text" id="custom-poi-input" placeholder="输入高德POI编码，如: 120201">
                    <button id="poi-query-btn" class="btn-secondary">查看POI分类</button>
                </div>
                <p class="input-hint">支持多个编码(逗号分隔)或范围编码(如: 120200-120203)</p>
            </div>

            <div class="sidebar-actions">
                <button id="search-btn" class="btn-primary btn-large">开始搜索</button>
            </div>
        </aside>

        <main class="main-content">
            <div id="map-container" class="map-container"></div>

            <div class="results-panel">
                <div class="results-header">
                    <h3>搜索结果</h3>
                    <div class="results-actions">
                        <span id="results-count" class="results-count">0 条结果</span>
                        <button id="export-btn" class="btn-primary" disabled>导出Excel</button>
                    </div>
                </div>
                <div class="results-table-wrapper">
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>项目名称</th>
                                <th>业态分类</th>
                                <th>详细地址</th>
                                <th>距离(km)</th>
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            <tr class="empty-row">
                                <td colspan="5">请先在地图上定位，然后点击搜索</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="results-pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <div id="poi-query-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>POI 分类查询</h3>
                <button class="modal-close" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="poi-search-box">
                    <input type="text" id="poi-search-input" placeholder="搜索POI分类...">
                </div>
                <div class="poi-results" id="poi-results">
                    <p class="poi-hint">请输入关键词搜索POI分类</p>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <p>搜索中...</p>
    </div>

    <script src="js/config.js"></script>
    <script>
        window._AMapSecurityConfig = {
            securityJsCode: CONFIG.SECURITY_CODE
        };
        var amapKey = CONFIG.AMAP_KEY;
        var amapScript = document.createElement('script');
        amapScript.src = 'https://webapi.amap.com/maps?v=2.0&key=' + amapKey;
        document.head.appendChild(amapScript);
    </script>
    <script src="js/utils.js"></script>
    <script src="js/map-manager.js"></script>
    <script src="js/search-manager.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/export-manager.js"></script>
    <script src="js/poi-query-panel.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
